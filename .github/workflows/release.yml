name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  WAILS_VERSION: v2.12.0

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS-universal
            platform: darwin/universal
            artifact: officedex-macos
          - os: windows-latest
            label: Windows-amd64
            platform: windows/amd64
            artifact: officedex-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install npm dependencies
        run: npm ci

      - name: Lint (typecheck)
        run: npm run lint

      - name: Renderer tests (vitest)
        run: npx vitest run

      - name: Go tests
        run: go test ./...

      - name: Prefetch officecli binary
        run: npm run prefetch:officecli

      - name: Wails build
        run: wails build -platform ${{ matrix.platform }} -trimpath

      - name: Codesign + embed officecli (macOS)
        if: runner.os == 'macOS'
        run: |
          node scripts/codesign-bundled-officecli.mjs \
            --app build/bin/OfficeDex.app \
            --source build/officecli/officecli

      - name: Bundle officecli (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $resDir = "build\bin\officecli"
          New-Item -ItemType Directory -Force -Path $resDir | Out-Null
          Copy-Item "build\officecli\officecli.exe" -Destination "$resDir\officecli.exe" -Force
          Copy-Item "build\officecli\version.json" -Destination "$resDir\version.json" -Force

      - name: Archive (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist-artifacts
          tag="${GITHUB_REF_NAME}"
          archive="OfficeDex-${tag}-darwin-universal.zip"
          (cd build/bin && ditto -c -k --sequesterRsrc --keepParent OfficeDex.app "../../dist-artifacts/${archive}")
          ls -la dist-artifacts/

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null
          $tag = $env:GITHUB_REF_NAME
          $archive = "OfficeDex-${tag}-windows-amd64.zip"
          Compress-Archive -Path build\bin\* -DestinationPath "dist-artifacts\$archive" -Force
          Get-ChildItem dist-artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist-artifacts/
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: officedex-macos
          path: dist-release/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: officedex-windows
          path: dist-release/

      - name: List artifacts
        run: ls -la dist-release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist-release/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
