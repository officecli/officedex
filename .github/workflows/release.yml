name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

env:
  WAILS_VERSION: v2.12.0

jobs:
  build:
    name: Build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS-universal
            platform: darwin/universal
            artifact: officedex-macos
          - os: windows-latest
            label: Windows-amd64
            platform: windows/amd64
            artifact: officedex-windows

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${{ env.WAILS_VERSION }}

      - name: Install npm dependencies
        run: npm ci

      - name: Stub dist/ so `wails generate module` can compile main.go
        # main.go has `//go:embed all:dist`; the renderer build that fills
        # dist/ depends on the very bindings `wails generate module` produces.
        # Drop a placeholder file so the embed pattern resolves now; vite
        # will overwrite it during the real frontend build below.
        shell: bash
        run: mkdir -p dist && touch dist/.placeholder

      - name: Generate Wails bindings
        run: wails generate module

      - name: Lint (typecheck)
        run: npm run lint

      - name: Renderer tests (vitest)
        run: npx vitest run

      - name: Go tests
        run: go test ./...

      - name: Prefetch officecli binary
        run: npm run prefetch:officecli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Wails build
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          wails build -platform ${{ matrix.platform }} -trimpath -ldflags "-X main.appVersion=${version}"

      - name: Import signing certificate (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_P12_BASE64: ${{ secrets.APPLE_P12_BASE64 }}
          APPLE_P12_PASSWORD: ${{ secrets.APPLE_P12_PASSWORD }}
        run: |
          set -euo pipefail
          # Isolate the cert in a temp keychain so its lifetime is bounded to this job.
          KEYCHAIN_PATH="$RUNNER_TEMP/officedex-signing.keychain-db"
          KEYCHAIN_PASS="$(openssl rand -hex 16)"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "::add-mask::$KEYCHAIN_PASS"

          security create-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          # Prepend the temp keychain to the user search list so codesign finds the identity.
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | sed 's/"//g')

          P12_PATH="$RUNNER_TEMP/cert.p12"
          printf '%s' "$APPLE_P12_BASE64" | base64 --decode > "$P12_PATH"
          security import "$P12_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_P12_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          rm -f "$P12_PATH"

          # Authorize codesign to use the imported private key without a GUI prompt.
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASS" "$KEYCHAIN_PATH"

          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Codesign + embed officecli (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: |
          node scripts/codesign-bundled-officecli.mjs \
            --app build/bin/OfficeDex.app \
            --source build/officecli/officecli \
            --identity "$APPLE_DEVELOPER_ID"

      - name: Verify bundled officecli is universal2 (macOS)
        if: runner.os == 'macOS'
        # The .app is darwin/universal; an arch-specific officecli would crash on
        # the other architecture with "bad CPU type in executable". Fail the
        # release rather than ship a binary that bricks Intel (or Apple Silicon).
        run: |
          set -euo pipefail
          bin="build/bin/OfficeDex.app/Contents/Resources/officecli/officecli"
          archs="$(lipo -archs "$bin")"
          echo "bundled officecli archs: $archs"
          for required in x86_64 arm64; do
            echo "$archs" | grep -qw "$required" || {
              echo "::error::bundled officecli is missing the $required slice (got: $archs)"
              exit 1
            }
          done

      - name: Bundle extrender (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_DEVELOPER_ID: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: |
          resDir="build/bin/OfficeDex.app/Contents/Resources/extrender"
          mkdir -p "$resDir"
          cp build/extrender/mac-arm64/extrender "$resDir/extrender"
          chmod +x "$resDir/extrender"
          codesign --force --sign "$APPLE_DEVELOPER_ID" \
            --options runtime --timestamp "$resDir/extrender"

      - name: Notarize .app (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          NOTARIZE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          NOTARIZE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          CODESIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: |
          set -euo pipefail
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$KEY_PATH"
          NOTARIZE_API_KEY_PATH="$KEY_PATH" node scripts/notarize.mjs build/bin/OfficeDex.app
          rm -f "$KEY_PATH"

      - name: Bundle officecli (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $resDir = "build\bin\officecli"
          New-Item -ItemType Directory -Force -Path $resDir | Out-Null
          Copy-Item "build\officecli\officecli.exe" -Destination "$resDir\officecli.exe" -Force
          Copy-Item "build\officecli\version.json" -Destination "$resDir\version.json" -Force

      - name: Bundle extrender (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $resDir = "build\bin\extrender"
          New-Item -ItemType Directory -Force -Path $resDir | Out-Null
          Copy-Item "build\extrender\win-x64\extrender.exe" -Destination "$resDir\extrender.exe" -Force

      - name: Archive (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist-artifacts
          tag="${GITHUB_REF_NAME}"
          archive="OfficeDex-${tag}-darwin-universal.zip"
          (cd build/bin && ditto -c -k --sequesterRsrc --keepParent OfficeDex.app "../../dist-artifacts/${archive}")
          ls -la dist-artifacts/

      - name: Install create-dmg (macOS)
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Build DMG installer (macOS)
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          dmg="OfficeDex-${tag}-darwin-universal.dmg"
          # Stage the .app in its own directory so create-dmg only includes it
          # (avoids leftover officecli/ from earlier build steps).
          staging="$(mktemp -d)"
          cp -R build/bin/OfficeDex.app "${staging}/"
          create-dmg \
            --volname "OfficeDex ${tag}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "OfficeDex.app" 175 200 \
            --hide-extension "OfficeDex.app" \
            --app-drop-link 425 200 \
            --no-internet-enable \
            "dist-artifacts/${dmg}" \
            "${staging}"
          ls -la dist-artifacts/

      - name: Notarize DMG (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY_P8: ${{ secrets.APPLE_API_KEY_P8 }}
          NOTARIZE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          NOTARIZE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          CODESIGN_IDENTITY: ${{ secrets.APPLE_DEVELOPER_ID }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          printf '%s' "$APPLE_API_KEY_P8" > "$KEY_PATH"
          NOTARIZE_API_KEY_PATH="$KEY_PATH" \
            node scripts/notarize.mjs "dist-artifacts/OfficeDex-${tag}-darwin-universal.dmg"
          rm -f "$KEY_PATH"

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-artifacts | Out-Null
          $tag = $env:GITHUB_REF_NAME
          $archive = "OfficeDex-${tag}-windows-amd64.zip"
          Compress-Archive -Path build\bin\* -DestinationPath "dist-artifacts\$archive" -Force
          Get-ChildItem dist-artifacts

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist-artifacts/
          if-no-files-found: error
          retention-days: 14

      - name: Cleanup signing keychain (macOS)
        if: runner.os == 'macOS' && always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v8
        with:
          name: officedex-macos
          path: dist-release/

      - name: Download Windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: officedex-windows
          path: dist-release/

      - name: List artifacts
        run: ls -la dist-release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist-release/*.zip
            dist-release/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  sync-to-dist:
    name: Sync to officedex-dist
    needs: release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repo (for scripts/build-manifest.mjs)
        uses: actions/checkout@v6
        with:
          path: src

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: officedex-macos
          path: artifacts/

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: officedex-windows
          path: artifacts/

      - name: Clone officedex-dist
        env:
          GH_TOKEN: ${{ secrets.DIST_DEPLOY_TOKEN }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/officecli/officedex-dist.git" dist
          cd dist
          git config user.email "release-bot@officedex.app"
          git config user.name "OfficeDex Release Bot"

      - name: Generate manifest.json
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          notes=$(gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" --json body --jq .body 2>/dev/null || echo "")
          node src/scripts/build-manifest.mjs \
            --version "${version}" \
            --darwin "artifacts/OfficeDex-${tag}-darwin-universal.zip" \
            --windows "artifacts/OfficeDex-${tag}-windows-amd64.zip" \
            --notes "${notes:-Release ${tag}}" \
            --out dist/manifest.json
          mkdir -p dist/archive
          cp dist/manifest.json "dist/archive/manifest-${tag}.json"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push to officedex-dist
        run: |
          cd dist
          tag="${GITHUB_REF_NAME}"
          git add manifest.json archive/
          git commit -m "release: ${tag}" -m "Auto-synced from officecli/officedex@${GITHUB_SHA} (assets served from source repo release)"
          git push origin main
